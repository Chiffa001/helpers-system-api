services:
  postgres:
    image: postgres:17-alpine
    container_name: helpers-system-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: helpers_system
      POSTGRES_USER: helpers
      POSTGRES_PASSWORD: helpers
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helpers -d helpers_system"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: helpers-system-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
